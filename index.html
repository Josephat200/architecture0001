    <script>
    // Array of high-contrast, real architectural images
    const bgImages = [
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1500&q=80', // Modern villa, dark/neutral
        'https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=crop&w=1500&q=80', // Office block, blue/grey
        'https://images.unsplash.com/photo-1519125323398-675f0ddb6308?auto=format&fit=crop&w=1500&q=80', // Glass building, blue
        'https://images.unsplash.com/photo-1523413363574-c30aa1c2a516?auto=format&fit=crop&w=1500&q=80', // White/grey, modern
        'https://images.unsplash.com/photo-1465101046530-73398c7f28ca?auto=format&fit=crop&w=1500&q=80', // Resort, dusk
        'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=1500&q=80'  // Campus, blue/grey
    ];
    let bgIndex = 0;
    const heroBg = document.getElementById('hero-bg');
    const overlay = document.querySelector('.overlay');
    function setBg(idx) {
        heroBg.style.backgroundImage = `url('${bgImages[idx]}')`;
        heroBg.style.backgroundSize = 'cover';
        heroBg.style.backgroundPosition = 'center';
        heroBg.style.transition = 'background-image 1s ease-in-out';
        // Overlay for text contrast
        overlay.style.display = 'block';
        overlay.style.background = 'linear-gradient(135deg, rgba(24,24,28,0.82) 60%, rgba(40,40,48,0.72) 100%)';
        overlay.style.position = 'absolute';
        overlay.style.top = 0;
        overlay.style.left = 0;
        overlay.style.width = '100%';
        overlay.style.height = '100%';
        overlay.style.zIndex = 1;
        overlay.style.pointerEvents = 'none';
        overlay.style.transition = 'background 0.5s';
    }
    setBg(bgIndex);
    setInterval(() => {
        bgIndex = (bgIndex + 1) % bgImages.length;
        setBg(bgIndex);
    }, 6000);
    </script>
